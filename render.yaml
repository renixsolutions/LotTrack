services:
  - type: web
    name: lottrack-app
    env: node
    plan: free
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://lottrack.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lottrack-db
          property: connectionString

databases:
  - name: lottrack-db
    plan: free
    postgresMajorVersion: 15
